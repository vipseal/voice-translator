name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          fi
      - name: Build Android Debug APK
        run: ./gradlew :composeApp:assembleDebug
      - name: Build Android Release APK
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/**/*.apk

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageDeb
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: composeApp/build/compose/binaries/main/deb/*.deb

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
        run: find . -name "GeminiService.kt" -exec sed -i 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Build Windows MSI
        shell: cmd
        run: call gradlew.bat :composeApp:packageMsi --no-build-cache --rerun-tasks
      - name: List build output
        shell: cmd
        run: dir /s /b composeApp\build\compose\binaries\
        continue-on-error: true
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Clean and Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-build-cache --rerun-tasks
      - name: Archive iOS Framework
        run: |
          cd composeApp/build/bin/iosArm64/releaseFramework
          zip -r ${{ github.workspace }}/ComposeApp-ios-framework.zip ComposeApp.framework
      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ComposeApp-ios-framework.zip

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Web App
        run: cd web && zip -r ../VoiceTranslator-web.zip .
      - name: Upload Web App
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: VoiceTranslator-web.zip

  release:
    needs: [build-android, build-desktop-linux, build-desktop-macos, build-desktop-windows, build-ios, build-web]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.zip
            artifacts/**/*.jar
          generate_release_notes: true
          draft: false
          prerelease: true
