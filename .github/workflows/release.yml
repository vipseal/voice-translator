name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Build targets (comma-separated: android,linux,macos,windows,ios,web,all)'
        required: false
        default: 'all'

jobs:
  # Determine which targets to build
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_android: ${{ steps.targets.outputs.android }}
      build_linux: ${{ steps.targets.outputs.linux }}
      build_macos: ${{ steps.targets.outputs.macos }}
      build_windows: ${{ steps.targets.outputs.windows }}
      build_ios: ${{ steps.targets.outputs.ios }}
      build_web: ${{ steps.targets.outputs.web }}
    steps:
      - id: targets
        run: |
          TARGETS="${{ github.event.inputs.targets || 'all' }}"
          if [[ "$TARGETS" == "all" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "linux=true" >> $GITHUB_OUTPUT
            echo "macos=true" >> $GITHUB_OUTPUT
            echo "windows=true" >> $GITHUB_OUTPUT
            echo "ios=false" >> $GITHUB_OUTPUT
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "android=$([[ "$TARGETS" == *android* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "linux=$([[ "$TARGETS" == *linux* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "macos=$([[ "$TARGETS" == *macos* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "windows=$([[ "$TARGETS" == *windows* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "ios=$([[ "$TARGETS" == *ios* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "web=$([[ "$TARGETS" == *web* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  build-android:
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          fi
      - name: Build Android Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/release/*.apk

  build-desktop-linux:
    needs: setup
    if: needs.setup.outputs.build_linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageDeb
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: composeApp/build/compose/binaries/main/deb/*.deb

  build-desktop-macos:
    needs: setup
    if: needs.setup.outputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12
      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-desktop-windows:
    needs: setup
    if: needs.setup.outputs.build_windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build Windows MSI
        shell: cmd
        run: call gradlew.bat :composeApp:packageMsi --no-build-cache --rerun-tasks
      - name: List build output
        shell: cmd
        run: dir /s /b composeApp\build\compose\binaries\
        continue-on-error: true
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  build-ios:
    needs: setup
    if: needs.setup.outputs.build_ios == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Clean and Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-build-cache --rerun-tasks
      - name: Archive iOS Framework
        run: |
          cd composeApp/build/bin/iosArm64/releaseFramework
          zip -r ${{ github.workspace }}/ComposeApp-ios-framework.zip ComposeApp.framework
      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ComposeApp-ios-framework.zip

  build-web:
    needs: setup
    if: needs.setup.outputs.build_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build WASM Distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
      - name: Package Web App
        run: cd composeApp/build/dist/wasmJs/productionExecutable && zip -r $GITHUB_WORKSPACE/VoiceTranslator-web.zip .
      - name: Upload Web App
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: VoiceTranslator-web.zip

  release:
    needs: [setup, build-android, build-desktop-linux, build-desktop-macos, build-desktop-windows, build-ios, build-web]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.zip
            artifacts/**/*.jar
          generate_release_notes: true
          draft: false
          prerelease: true
