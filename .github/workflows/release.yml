name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Set Gemini API Key
        run: find . -name "GeminiService.kt" -exec sed -i 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Build Android Debug APK
        run: ./gradlew :composeApp:assembleDebug
      - name: Build Android Release APK
        run: ./gradlew :composeApp:assembleRelease
        continue-on-error: true
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/**/*.apk

  build-desktop-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Set Gemini API Key
        run: find . -name "GeminiService.kt" -exec sed -i 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageDeb
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: composeApp/build/compose/binaries/main/deb/*.deb

  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Set Gemini API Key
        run: find . -name "GeminiService.kt" -exec sed -i '' 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Set Gemini API Key
        shell: bash
        run: find . -name "GeminiService.kt" -exec sed -i 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Build Windows Uber JAR
        run: |
          ./gradlew :composeApp:packageUberJarForCurrentOS
          echo "=== Finding JAR output ==="
          find composeApp/build -name "*.jar" -not -path "*/gradle-wrapper*" -not -path "*/tmp/*" -not -path "*/classes/*" 2>/dev/null | head -20
        shell: bash
      - name: Locate and copy JAR
        shell: bash
        run: |
          JAR=$(find composeApp/build -name "*uber*" -o -name "*all*" -o -name "*desktop*" 2>/dev/null | grep "\.jar$" | head -1)
          if [ -z "$JAR" ]; then
            JAR=$(find composeApp/build/compose -name "*.jar" 2>/dev/null | head -1)
          fi
          if [ -z "$JAR" ]; then
            JAR=$(find composeApp/build -name "*.jar" -not -path "*/gradle-wrapper*" -not -path "*/tmp/*" -not -path "*/classes/*" -not -path "*/kotlin-tooling*" 2>/dev/null | sort -k5 -t/ | tail -1)
          fi
          if [ -n "$JAR" ]; then
            echo "Found JAR: $JAR"
            cp "$JAR" VoiceTranslator-windows.jar
          else
            echo "No JAR found, listing all build outputs:"
            find composeApp/build -maxdepth 4 -type f -name "*.jar" 2>/dev/null
          fi
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: VoiceTranslator-windows.jar
          if-no-files-found: warn

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Set Gemini API Key
        run: find . -name "GeminiService.kt" -exec sed -i '' 's/GEMINI_API_KEY_PLACEHOLDER/${{ secrets.GEMINI_API_KEY }}/g' {} +
      - name: Clean and Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-build-cache --rerun-tasks
      - name: Archive iOS Framework
        run: |
          cd composeApp/build/bin/iosArm64/releaseFramework
          zip -r ${{ github.workspace }}/ComposeApp-ios-framework.zip ComposeApp.framework
      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: ComposeApp-ios-framework.zip

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package Web App
        run: cd web && zip -r ../VoiceTranslator-web.zip .
      - name: Upload Web App
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: VoiceTranslator-web.zip

  release:
    needs: [build-android, build-desktop-linux, build-desktop-macos, build-desktop-windows, build-ios, build-web]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.zip
            artifacts/**/*.jar
          generate_release_notes: true
          draft: false
          prerelease: true
