name: Build & Release

env:
  ENCRYPTED_GEMINI_KEY: ${{ secrets.ENCRYPTED_GEMINI_KEY }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Build targets (comma-separated: android,linux,macos,windows,ios,web,all)'
        required: false
        default: 'all'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      build_android: ${{ steps.targets.outputs.android }}
      build_linux: ${{ steps.targets.outputs.linux }}
      build_macos: ${{ steps.targets.outputs.macos }}
      build_windows: ${{ steps.targets.outputs.windows }}
      build_ios: ${{ steps.targets.outputs.ios }}
      build_web: ${{ steps.targets.outputs.web }}
      tag_name: ${{ steps.tag.outputs.tag }}
    steps:
      - id: targets
        run: |
          TARGETS="${{ github.event.inputs.targets || 'all' }}"
          if [[ "$TARGETS" == "all" ]] || [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "linux=true" >> $GITHUB_OUTPUT
            echo "macos=true" >> $GITHUB_OUTPUT
            echo "windows=true" >> $GITHUB_OUTPUT
            echo "ios=false" >> $GITHUB_OUTPUT
            echo "web=true" >> $GITHUB_OUTPUT
          else
            echo "android=$([[ "$TARGETS" == *android* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "linux=$([[ "$TARGETS" == *linux* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "macos=$([[ "$TARGETS" == *macos* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "windows=$([[ "$TARGETS" == *windows* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "ios=$([[ "$TARGETS" == *ios* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "web=$([[ "$TARGETS" == *web* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi
      - id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  # Create release first so build jobs can upload directly to it
  create-release:
    needs: setup
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: true

  build-android:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_android == 'true' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          fi
      - name: Build Android Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease
      - name: Rename APK
        run: |
          APK=$(find composeApp/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "VoiceTranslator-${{ needs.setup.outputs.tag_name }}-android.apk"
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: VoiceTranslator-*.apk

  build-desktop-linux:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_linux == 'true' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build Linux DEB
        run: ./gradlew :composeApp:packageDeb
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: composeApp/build/compose/binaries/main/deb/*.deb

  build-desktop-macos:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_macos == 'true' && !cancelled()
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12
      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: composeApp/build/compose/binaries/main/dmg/*.dmg

  build-desktop-windows:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_windows == 'true' && !cancelled()
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build Windows MSI
        shell: cmd
        run: call gradlew.bat :composeApp:packageMsi --no-build-cache --rerun-tasks
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: composeApp/build/compose/binaries/main/msi/*.msi

  build-ios:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_ios == 'true' && !cancelled()
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Clean and Build iOS Framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --no-build-cache --rerun-tasks
      - name: Archive iOS Framework
        run: |
          cd composeApp/build/bin/iosArm64/releaseFramework
          zip -r ${{ github.workspace }}/ComposeApp-ios-framework.zip ComposeApp.framework
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: ComposeApp-ios-framework.zip

  build-web:
    needs: [setup, create-release]
    if: always() && needs.setup.outputs.build_web == 'true' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
      - name: Build WASM Distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
      - name: Package Web App
        run: cd composeApp/build/dist/wasmJs/productionExecutable && zip -r $GITHUB_WORKSPACE/VoiceTranslator-web.zip .
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: VoiceTranslator-web.zip
