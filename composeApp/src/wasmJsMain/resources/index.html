<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script>if(!window.location.pathname.endsWith('/'))window.location.replace(window.location.pathname+'/');</script>
    <title>VoiceTranslator</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7C4DFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VoiceTranslator">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0F0F1A; }
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: #E8E8F2; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #loading h2 { color: #7C4DFF; margin-bottom: 20px; }
        .progress-bar { width: 200px; height: 4px; background: #1A1A2E; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #7C4DFF; width: 0%; transition: width 0.3s; border-radius: 2px; }
        #loading-text { margin-top: 12px; font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <div id="loading">
        <h2>VoiceTranslator</h2>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div id="loading-text">Loading...</div>
    </div>
    <script>
        let progress = 0;
        const progressEl = document.getElementById('progress');
        const textEl = document.getElementById('loading-text');
        const steps = ['Loading runtime...', 'Loading fonts...', 'Initializing...', 'Starting app...'];
        let step = 0;
        const interval = setInterval(() => {
            progress = Math.min(progress + Math.random() * 15 + 5, 95);
            progressEl.style.width = progress + '%';
            if (step < steps.length) { textEl.textContent = steps[step]; step++; }
        }, 800);
        window.addEventListener('load', () => {
            clearInterval(interval);
            progressEl.style.width = '100%';
            textEl.textContent = 'Starting...';
        });
        // Hide loading only when Compose canvas is actually rendered
        function checkCanvas() {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                document.getElementById('loading').style.display = 'none';
            } else {
                requestAnimationFrame(checkCanvas);
            }
        }
        requestAnimationFrame(checkCanvas);

        // Timeout - if canvas doesn't appear in 30s, show help
        setTimeout(function() {
            if (!document.querySelector('canvas')) {
                textEl.innerHTML = '⏳ Still loading (~13MB)... Please wait.<br><small style="color:#666">If stuck, try Chrome 119+ / Firefox 120+ / Edge 119+</small>';
                textEl.style.color = '#ffaa00';
            }
        }, 15000);
        setTimeout(function() {
            if (!document.querySelector('canvas')) {
                textEl.innerHTML = '❌ Failed to load. Try refreshing (Cmd+Shift+R).<br>Requires Chrome 119+, Firefox 120+, or Edge 119+.<br><small style="color:#666">WASM GC support required</small>';
                textEl.style.color = '#ff5555';
            }
        }, 45000);

        // Catch WASM/JS errors and display them
        window.addEventListener('error', function(e) {
            clearInterval(interval);
            var msg = e.message || 'Unknown error';
            if (msg.indexOf('CompileError') >= 0 || msg.indexOf('wasm') >= 0) {
                textEl.innerHTML = '❌ Your browser does not support WASM GC.<br>Please use Chrome 119+, Firefox 120+, or Edge 119+.';
            } else {
                textEl.innerHTML = '❌ Error: ' + msg;
            }
            textEl.style.color = '#ff5555';
            progressEl.style.background = '#ff5555';
            console.error('Load error:', e);
        });
        window.addEventListener('unhandledrejection', function(e) {
            clearInterval(interval);
            var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unknown error';
            if (msg.indexOf('CompileError') >= 0 || msg.indexOf('wasm') >= 0) {
                textEl.innerHTML = '❌ Your browser does not support WASM GC.<br>Please use Chrome 119+, Firefox 120+, or Edge 119+.';
            } else {
                textEl.innerHTML = '❌ Error: ' + msg;
            }
            textEl.style.color = '#ff5555';
            progressEl.style.background = '#ff5555';
            console.error('Unhandled rejection:', e.reason);
        });
    </script>
    <script src="voicetranslator.js"></script>
</body>
</html>
